name: Deploy to Firebase Hosting

# Session 18A: migrated from --token auth to Workload Identity Federation.
# GitHub Actions mints a short-lived Google access token per run via the
# google-github-actions/auth action; no long-lived secret to rotate.
# WIF pool/provider + service account configured in cloud shell:
#   pool:      projects/456789704122/locations/global/workloadIdentityPools/github-pool
#   provider:  .../providers/github-provider
#   sa:        github-deployer@psm-generator.iam.gserviceaccount.com
on:
  push:
    branches: [main]
  workflow_dispatch:

# Only one deploy at a time — if two pushes land back-to-back, cancel the
# older run so we never race the live site into an older build.
concurrency:
  group: firebase-deploy
  cancel-in-progress: true

# Required for the OIDC token exchange with Google STS.
permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node (for esbuild parse check + functions deploy)
        uses: actions/setup-node@v4
        with:
          # Matches the functions runtime (engines.node = "22" in
          # functions/package.json) so `npm ci` resolves the same
          # platform-specific deps that will run in production.
          node-version: "22"

      # ── Pre-deploy verification ────────────────────────────────────────
      # Deploy is its own source of truth — it re-runs the parse + build
      # checks itself rather than trusting that CI ran first. If these fail
      # the job aborts before touching Firebase.
      - name: Parse app.jsx (JSX syntax check)
        run: npx --yes esbuild@0.24.0 app.jsx --jsx=transform --jsx-factory=React.createElement --jsx-fragment=React.Fragment --log-level=error > /dev/null

      - name: Parse embed.js (JS syntax check)
        run: npx --yes esbuild@0.24.0 embed.js --log-level=error > /dev/null

      - name: Run unit tests (node:test)
        run: node --test tests/*.mjs

      - name: Build index.html
        run: python build_index.py

      - name: Verify index.html is up-to-date with sources
        run: |
          if ! git diff --quiet -- index.html; then
            echo "::error::index.html is out of date with its sources. Refusing to deploy."
            git diff --stat -- index.html
            exit 1
          fi

      # ── Authenticate to Google Cloud via WIF ───────────────────────────
      # Exchanges the GitHub OIDC token for a short-lived Google access
      # token via Security Token Service. No FIREBASE_TOKEN secret needed.
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: "projects/456789704122/locations/global/workloadIdentityPools/github-pool/providers/github-provider"
          service_account: "github-deployer@psm-generator.iam.gserviceaccount.com"

      # ── Deploy ─────────────────────────────────────────────────────────
      # firebase-tools picks up the GOOGLE_APPLICATION_CREDENTIALS env var
      # set by the auth action above. No --token needed.
      #
      # Session 18A: dropped `,storage` from the deploy targets. Storage
      # rules change ~once a year; require Kiran or Aidan to run
      # `firebase deploy --only storage` manually when storage.rules
      # changes. Avoids needing storage.admin on the CI service account.
      - name: Deploy to Firebase Hosting
        run: |
          npx --yes firebase-tools@13 deploy \
            --only hosting \
            --project psm-generator \
            --non-interactive

      # ── Cloud Functions deploy (Session 18C v24) ──────────────────────
      # Previously the deploy job only shipped hosting, which meant every
      # functions/ change (grader, regrade, reset, audit logging, etc.)
      # since fc31dba had been silently sitting in main without reaching
      # Firebase. That's why per-WS submissions stopped showing
      # per-question annotations — the trigger that's actually running
      # was the months-old original.
      #
      # Functions deploy runs AFTER hosting + with continue-on-error so a
      # missing IAM perm doesn't block hosting. The deploy log will name
      # the exact missing role if the github-deployer SA needs more
      # access (roles/cloudfunctions.developer, roles/run.admin,
      # roles/cloudbuild.builds.editor, roles/storage.objectAdmin,
      # roles/iam.serviceAccountUser).
      #
      # Predeploy hook in firebase.json copies worksheets_catalog.json
      # into the functions bundle so loadCatalogByTitle() can read it.
      - name: Install functions deps
        working-directory: functions
        run: npm ci --no-audit --no-fund

      - name: Deploy Cloud Functions
        continue-on-error: true
        run: |
          npx --yes firebase-tools@13 deploy \
            --only functions \
            --project psm-generator \
            --non-interactive \
            --force
