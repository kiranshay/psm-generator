<style>
  /* =========================================================
     PSM GENERATOR — Editorial design system
     Fraunces (display serif) + IBM Plex Sans (UI) + Plex Mono
     Palette: warm paper, deep ink, ATS-blue accent, sienna highlight
     ========================================================= */
  :root{
    /* Surfaces — warm paper, cool ink (editorial house style) */
    --paper: #FAF7F2;          /* warm off-white background */
    --paper-alt: #F3EEE4;      /* aged-paper surface for panels */
    --card: #FFFFFF;           /* card / input surface */

    /* Ink — cooled toward ATS navy family */
    --ink: #0F1A2E;            /* primary text, deep navy-black */
    --ink-soft: #2E3A57;       /* secondary text */
    --ink-mute: #66708A;       /* tertiary / captions */
    --rule: rgba(15,26,46,.12);/* border / hairline rules */
    --rule-strong: rgba(15,26,46,.22);

    /* ATS brand navies — sampled from the official logo */
    --brand: #004A79;          /* ATS primary navy */
    --brand-dark: #003258;     /* ATS deep navy / hover */
    --brand-light: #0066A6;    /* ATS lighter accent */
    --brand-soft: #E1ECF4;     /* brand-tinted surface */
    --accent: #9A5B1F;         /* burnt sienna editorial counterpoint */
    --accent-soft: #F5E9DA;

    /* Semantic */
    --ok: #2D6A4F;
    --warn: #B8860B;
    --danger: #8C2E2E;

    /* Typography */
    --font-display: 'Fraunces', 'Source Serif 4', Georgia, serif;
    --font-body: 'IBM Plex Sans', system-ui, -apple-system, sans-serif;
    --font-mono: 'IBM Plex Mono', 'SF Mono', Menlo, monospace;

    /* Elevation — restrained, editorial */
    --shadow-sm: 0 1px 2px rgba(28,32,51,.06), 0 0 0 1px rgba(28,32,51,.04);
    --shadow-md: 0 4px 14px -6px rgba(28,32,51,.14), 0 0 0 1px rgba(28,32,51,.05);
    --shadow-lg: 0 20px 40px -20px rgba(28,32,51,.22), 0 0 0 1px rgba(28,32,51,.06);
  }

  *{box-sizing:border-box;}
  html,body,#root{margin:0;padding:0;height:100%;}

  body{
    font-family: var(--font-body);
    font-feature-settings: "ss01","ss02","cv11";
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    background: var(--paper);
    color: var(--ink);
    /* Subtle paper grain */
    background-image:
      radial-gradient(circle at 20% 10%, rgba(47,107,154,.04), transparent 40%),
      radial-gradient(circle at 80% 60%, rgba(154,91,31,.035), transparent 45%);
  }

  /* Typographic defaults — Fraunces display with optical sizing */
  h1,h2,h3,h4,.display{
    font-family: var(--font-display);
    font-optical-sizing: auto;
    font-variation-settings: "opsz" 96, "SOFT" 30;
    letter-spacing: -0.015em;
    color: var(--ink);
  }

  /* Selection — brand-tinted, no blue OS default */
  ::selection{ background: var(--brand); color: var(--paper); }

  /* Scrollbars — thin, paper-toned */
  *::-webkit-scrollbar{ width:10px; height:10px; }
  *::-webkit-scrollbar-track{ background: transparent; }
  *::-webkit-scrollbar-thumb{
    background: rgba(28,32,51,.16);
    border-radius: 10px;
    border: 2px solid var(--paper);
  }
  *::-webkit-scrollbar-thumb:hover{ background: rgba(28,32,51,.28); }

  /* Focus ring — sienna, editorial not electric */
  *:focus-visible{
    outline: 2px solid var(--accent);
    outline-offset: 2px;
    border-radius: 3px;
  }

  /* Button polish — inherits whatever inline styles set, adds transitions */
  button{ font-family: var(--font-body); transition: transform .12s ease, box-shadow .2s ease, background .2s ease, color .2s ease, border-color .2s ease; }
  button:not(:disabled):hover{ transform: translateY(-1px); }
  button:not(:disabled):active{ transform: translateY(0); }
  input,select,textarea{ font-family: var(--font-body); color: var(--ink); }
  input::placeholder,textarea::placeholder{ color: var(--ink-mute); font-style: italic; }
  input:focus,select:focus,textarea:focus{ outline: 2px solid var(--brand); outline-offset: 1px; border-color: var(--brand) !important; }
  input[type="checkbox"]{ accent-color: var(--brand); cursor: pointer; }

  /* Select — thin ink arrow, paper surface */
  select{
    appearance: none; -webkit-appearance: none;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='7' viewBox='0 0 10 7'><path d='M1 1l4 4 4-4' stroke='%230F1A2E' stroke-width='1.5' fill='none' stroke-linecap='round'/></svg>");
    background-repeat: no-repeat;
    background-position: right 10px center;
    padding-right: 28px !important;
  }

  /* Number inputs — no spinners on specific inputs, cleaner look */
  input[type="number"]{ font-variant-numeric: tabular-nums; }

  /* Labels on click rows in the WellEd/Vocab pickers get a hover lift */
  label:hover input[type="checkbox"]{ transform: scale(1.05); }

  /* Loading pulse */
  .pl{ animation: pl 1.2s ease-in-out infinite; }
  @keyframes pl{ 0%,100%{opacity:.35;} 50%{opacity:1;} }

  /* App reveal on mount */
  #root > div{ animation: rise .6s cubic-bezier(.2,.7,.2,1) both; }
  @keyframes rise{ from{ opacity:0; transform: translateY(6px); } to{ opacity:1; transform:none; } }

  /* Editorial header — overrides the old blue gradient bar via data-attr */
  [data-psm-header]{
    background: var(--paper) !important;
    color: var(--ink) !important;
    border-bottom: 1px solid var(--rule) !important;
    height: auto !important;
    padding: 24px 36px 22px !important;
    position: relative;
  }
  [data-psm-header]::after{
    content: "";
    position: absolute; left: 36px; right: 36px; bottom: -1px; height: 2px;
    background: linear-gradient(90deg, var(--brand) 0, var(--brand) 72px, transparent 72px);
  }
  [data-psm-logo]{
    width: 52px; height: 52px;
    border-radius: 12px;
    object-fit: cover;
    box-shadow: 0 1px 0 rgba(255,255,255,.6) inset, 0 0 0 1px var(--rule-strong), 0 6px 16px -8px rgba(0,74,121,.45);
    flex-shrink: 0;
  }
  [data-psm-header] [data-psm-title]{
    font-family: var(--font-display) !important;
    font-variation-settings: "opsz" 144, "SOFT" 20 !important;
    font-weight: 600 !important;
    font-size: 26px !important;
    letter-spacing: -0.02em !important;
    color: var(--ink) !important;
    line-height: 1.1 !important;
  }
  [data-psm-header] [data-psm-title] em{
    font-style: italic; color: var(--brand); font-weight: 500;
  }
  [data-psm-header] [data-psm-eyebrow]{
    font-family: var(--font-body) !important;
    font-size: 10px !important;
    font-weight: 600 !important;
    letter-spacing: 0.18em !important;
    text-transform: uppercase !important;
    color: var(--ink-mute) !important;
    opacity: 1 !important;
    margin-bottom: 6px;
  }
  [data-psm-header] [data-psm-actions]{
    color: var(--ink-soft) !important;
    gap: 8px !important;
  }
  [data-psm-header] [data-psm-actions] button,
  [data-psm-header] [data-psm-actions] label,
  [data-psm-header] [data-psm-actions] a{
    background: transparent !important;
    color: var(--ink-soft) !important;
    border: 1px solid var(--rule) !important;
    border-radius: 999px !important;
    padding: 6px 12px !important;
    font-size: 11px !important;
    font-weight: 500 !important;
    letter-spacing: 0.02em !important;
  }
  [data-psm-header] [data-psm-actions] button:hover,
  [data-psm-header] [data-psm-actions] label:hover,
  [data-psm-header] [data-psm-actions] a:hover{
    border-color: var(--ink) !important;
    color: var(--ink) !important;
    background: var(--paper-alt) !important;
  }
  [data-psm-header] [data-psm-exam] button[data-active="true"]{
    background: var(--brand) !important;
    color: var(--paper) !important;
    border-color: var(--brand) !important;
    box-shadow: 0 2px 8px -4px rgba(0,74,121,.6);
  }

  /* Editorial tab bar */
  [data-psm-tabs]{
    background: var(--paper) !important;
    border-bottom: 1px solid var(--rule) !important;
    padding: 0 36px !important;
    gap: 28px !important;
  }
  [data-psm-tabs] button{
    font-family: var(--font-display) !important;
    font-variation-settings: "opsz" 48 !important;
    font-size: 17px !important;
    font-weight: 500 !important;
    letter-spacing: -0.01em !important;
    padding: 18px 2px !important;
    color: var(--ink-mute) !important;
    border-bottom: 2px solid transparent !important;
    position: relative;
  }
  [data-psm-tabs] button:hover{ color: var(--ink) !important; }
  [data-psm-tabs] button[data-active="true"]{
    color: var(--ink) !important;
    border-bottom-color: var(--ink) !important;
    font-weight: 600 !important;
  }
  [data-psm-tabs] button[data-active="true"]::after{
    content:"";
    position:absolute; left:50%; bottom:-2px; width:6px; height:6px;
    transform: translate(-50%, 50%) rotate(45deg);
    background: var(--accent);
  }
  [data-psm-tabs] button span:first-child{ display:none !important; }  /* hide emoji icons */

  /* Body canvas */
  [data-psm-body]{
    background: var(--paper) !important;
    padding: 32px 36px !important;
  }

  /* Cloud / count chips in header */
  [data-psm-chip]{
    font-family: var(--font-mono) !important;
    font-size: 10px !important;
    letter-spacing: 0.04em !important;
    font-weight: 500 !important;
  }

  /* Signed-in user chip — override the global pill-button styling for the
     inline sign-out icon so it sits cleanly inside the chip container. */
  [data-psm-header] [data-psm-actions] [data-psm-user]{
    padding: 4px 4px 4px 12px !important;
  }
  [data-psm-header] [data-psm-actions] [data-psm-user] button{
    background: transparent !important;
    border: none !important;
    padding: 4px 6px 4px 2px !important;
    color: var(--ink-mute) !important;
    border-radius: 999px !important;
  }
  [data-psm-header] [data-psm-actions] [data-psm-user] button:hover{
    color: var(--danger) !important;
    background: transparent !important;
  }
  [data-psm-header] [data-psm-actions] [data-psm-user]:hover{
    border-color: var(--ink) !important;
  }

  /* Student portal responsive rules (Phase 2 Session 3). Scoped under
     [data-portal="student"] so no tutor-app selectors are affected. */
  @media (max-width: 768px){
    [data-portal="student"]{
      padding: 20px 16px 60px !important;
    }
    [data-portal="student"] table{
      font-size: 11px !important;
    }
    [data-portal="student"] table th,
    [data-portal="student"] table td{
      padding: 8px 6px !important;
    }
  }
  @media (max-width: 480px){
    [data-portal="student"]{
      padding: 16px 12px 48px !important;
    }
  }
</style>
</head>

const TAG_MAP = {};
Object.entries(_rawTagMap).forEach(([k,v])=>{
  const obj = v[1]==="domain" ? {subject:v[0],kind:"domain",name:v[2]} : {subject:v[0],kind:"sub",domain:v[2],name:v[3]};
  TAG_MAP[normTag(k)] = obj;
});

// Fuzzy tag lookup: exact match first, then substring, then keyword signature.
function lookupTag(raw){
  const n = normTag(raw);
  if(TAG_MAP[n]) return TAG_MAP[n];
  // Substring match — try longest known key that's a substring of the normalized tag.
  const keys = Object.keys(TAG_MAP).sort((a,b)=>b.length-a.length);
  for(const k of keys){ if(n.includes(k) || k.includes(n)) return TAG_MAP[k]; }
  // Keyword signature matching for common variants.
  const lc = raw.toLowerCase();
  // Math subdomains
  if(/linear.*one.*variable|1\s*var|one\s*variable/i.test(lc) && /linear/i.test(lc)) return {subject:"Math",kind:"sub",domain:"Algebra",name:"Linear Equations (1 Variable)"};
  if(/linear.*two.*variable|2\s*var|two\s*variable/i.test(lc) && /linear/i.test(lc)) return {subject:"Math",kind:"sub",domain:"Algebra",name:"Linear Equations (2 Variables)"};
  if(/linear.*function/i.test(lc)) return {subject:"Math",kind:"sub",domain:"Algebra",name:"Linear Functions"};
  if(/linear.*inequalit/i.test(lc)) return {subject:"Math",kind:"sub",domain:"Algebra",name:"Linear Inequalities"};
  if(/system.*linear/i.test(lc))    return {subject:"Math",kind:"sub",domain:"Algebra",name:"Systems of Linear Equations"};
  if(/equivalent.*expression/i.test(lc)) return {subject:"Math",kind:"sub",domain:"Advanced Math",name:"Equivalent Expressions"};
  if(/nonlinear.*equation/i.test(lc))    return {subject:"Math",kind:"sub",domain:"Advanced Math",name:"Nonlinear Equations"};
  if(/nonlinear.*function/i.test(lc))    return {subject:"Math",kind:"sub",domain:"Advanced Math",name:"Nonlinear Functions"};
  if(/percentage|percent/i.test(lc))     return {subject:"Math",kind:"sub",domain:"Problem-Solving & Data Analysis",name:"Percentages"};
  if(/ratio|rate|proportion|unit/i.test(lc)) return {subject:"Math",kind:"sub",domain:"Problem-Solving & Data Analysis",name:"Ratios, Rates, Proportions, Units"};
  if(/one[\s-]*var.*data|1[\s-]*var.*data/i.test(lc)) return {subject:"Math",kind:"sub",domain:"Problem-Solving & Data Analysis",name:"One-Variable Data"};
  if(/two[\s-]*var.*data|2[\s-]*var.*data/i.test(lc)) return {subject:"Math",kind:"sub",domain:"Problem-Solving & Data Analysis",name:"Two-Variable Data"};
  if(/probability/i.test(lc))                         return {subject:"Math",kind:"sub",domain:"Problem-Solving & Data Analysis",name:"Probability"};
  if(/inference|margin.*error/i.test(lc))             return {subject:"Math",kind:"sub",domain:"Problem-Solving & Data Analysis",name:"Inference & Margin of Error"};
  if(/statistic.*claim|observ.*stud|experiment/i.test(lc)) return {subject:"Math",kind:"sub",domain:"Problem-Solving & Data Analysis",name:"Evaluating Statistical Claims"};
  if(/area|volume/i.test(lc))           return {subject:"Math",kind:"sub",domain:"Geometry & Trigonometry",name:"Area & Volume"};
  if(/circle/i.test(lc))                return {subject:"Math",kind:"sub",domain:"Geometry & Trigonometry",name:"Circles"};
  if(/right.*triangle|trigonometry/i.test(lc)) return {subject:"Math",kind:"sub",domain:"Geometry & Trigonometry",name:"Right Triangles & Trigonometry"};
  if(/line.*angle.*triangle/i.test(lc)) return {subject:"Math",kind:"sub",domain:"Geometry & Trigonometry",name:"Lines, Angles, & Triangles"};
  // R&W subdomains
  if(/cross.*text.*connection/i.test(lc)) return {subject:"Reading & Writing",kind:"sub",domain:"Craft & Structure",name:"Cross Text Connections"};
  if(/text.*structure.*purpose|structure.*purpose/i.test(lc)) return {subject:"Reading & Writing",kind:"sub",domain:"Craft & Structure",name:"Text Structure & Purpose"};
  if(/word.*in.*context/i.test(lc))       return {subject:"Reading & Writing",kind:"sub",domain:"Craft & Structure",name:"Words in Context"};
  if(/central.*idea/i.test(lc))           return {subject:"Reading & Writing",kind:"sub",domain:"Information & Ideas",name:"Central Ideas & Details"};
  if(/command.*evidence/i.test(lc))       return {subject:"Reading & Writing",kind:"sub",domain:"Information & Ideas",name:"Command of Evidence"};
  if(/inference/i.test(lc) && /reading|info|idea/i.test(lc)) return {subject:"Reading & Writing",kind:"sub",domain:"Information & Ideas",name:"Inferences"};
  if(/rhetorical.*synthesis|synthesis/i.test(lc)) return {subject:"Reading & Writing",kind:"sub",domain:"Expression of Ideas",name:"Rhetorical Synthesis"};
  if(/transition/i.test(lc))                      return {subject:"Reading & Writing",kind:"sub",domain:"Expression of Ideas",name:"Transitions"};
  if(/form.*structure.*sense/i.test(lc))          return {subject:"Reading & Writing",kind:"sub",domain:"Standard English Conventions",name:"Form, Structure, & Sense"};
  if(/boundaries/i.test(lc))                       return {subject:"Reading & Writing",kind:"sub",domain:"Standard English Conventions",name:"Boundaries"};
  // Domain-only fallbacks
  if(/^alg/i.test(lc) || /algebra/i.test(lc))    return {subject:"Math",kind:"domain",name:"Algebra"};
  if(/adv.*math/i.test(lc))                       return {subject:"Math",kind:"domain",name:"Advanced Math"};
  if(/psda|problem.*solving.*data|data.*analysis/i.test(lc)) return {subject:"Math",kind:"domain",name:"Problem-Solving & Data Analysis"};
  if(/^geo/i.test(lc) || /geometry/i.test(lc))    return {subject:"Math",kind:"domain",name:"Geometry & Trigonometry"};
  if(/craft.*structure/i.test(lc))                return {subject:"Reading & Writing",kind:"domain",name:"Craft & Structure"};
  if(/information.*idea|info.*idea/i.test(lc))    return {subject:"Reading & Writing",kind:"domain",name:"Information & Ideas"};
  if(/expression.*idea/i.test(lc))                return {subject:"Reading & Writing",kind:"domain",name:"Expression of Ideas"};
  if(/standard.*english|conventions/i.test(lc))   return {subject:"Reading & Writing",kind:"domain",name:"Standard English Conventions"};
  return null;
}

// ── PARSE DIAGNOSTIC TEXT ───────────────────────────────────────────────────
// Pure core of `parseDiagnosticPdf`. Takes the already-extracted full text of
// a ZipGrade diagnostic PDF (newline-joined lines) plus the file name, returns
// the structured parse result. `parsedAt` is NOT set here — the caller stamps
// it so this function stays deterministic for tests.
function parseDiagnosticText(fullText, fileName){
  fullText = fullText || "";
  fileName = fileName || "";

  // Detect subject/module from the QUIZ NAME area (top of document + filename),
  // not the entire body. ZipGrade headers have "Quiz: <name>" or the name on
  // its own line near the top.
  const headerArea = fullText.slice(0, 800) + "\n" + fileName;
  let subject = "Unknown", module = null;
  const isMath = /\bmath\b|mathematics/i.test(headerArea);
  const isReading = /reading|writing|\br\s*&?\s*w\b|verbal|english/i.test(headerArea);
  const modMatch = headerArea.match(/mod(?:ule)?\s*\.?\s*(\d)/i);
  if(isMath){
    subject = "Math";
    if(modMatch) module = Number(modMatch[1]);
    else if(/\b(m1|math1|math\s*1|part\s*1|section\s*1)\b/i.test(headerArea)) module = 1;
    else if(/\b(m2|math2|math\s*2|part\s*2|section\s*2)\b/i.test(headerArea)) module = 2;
  } else if(isReading){
    subject = "Reading & Writing";
  } else {
    // Fall back: if tag area is dominated by R&W domains, mark as R&W; else math.
    const tagArea = (fullText.split(/TAGGED/i)[1]||"").toLowerCase();
    if(/c&s|eoi|sec|info\/ideas|craft|reading|writing/i.test(tagArea)) subject = "Reading & Writing";
    else if(/alg|advmath|psda|geo/i.test(tagArea)) subject = "Math";
  }

  const pctMatch = fullText.match(/Percent\s*Correct:?\s*([\d.]+)/i);
  const earnedMatch = fullText.match(/Earned\s*Points:?\s*(\d+)/i);
  const possMatch = fullText.match(/Possible\s*Points:?\s*(\d+)/i);

  // Extract tag rows. The section layout is:
  //   <tag name possibly wrapped across lines> <space> <earn> <poss> <pct>
  // We collapse whitespace/newlines then scan for sequences starting with "!SAT".
  // Some PDFs use "TAGGED QUESTIONS & QUIZ" or "TAGGED QUESTIONS".
  const tagSplitIdx = fullText.search(/TAGGED\s*QUESTIONS/i);
  const tagSection = tagSplitIdx>=0 ? fullText.slice(tagSplitIdx) : "";
  const cleaned = tagSection.replace(/\s+/g," ").trim();
  const rows = [];
  const chunks = cleaned.split(/(?=!SAT\s)/g).filter(c=>c.trim().startsWith("!SAT"));
  for(const chunk of chunks){
    // Relaxed regex: allow fractional pct, optional trailing text, different spacing.
    const m = chunk.match(/^(!SAT\s+.+?)\s+(\d+)\s+(\d+)\s+([\d.]+)/);
    if(!m) continue;
    let name = m[1].replace(/^!SAT\s+/,"").replace(/\s*\(\d{4}\)\s*$/,"").replace(/\s+/g," ").trim();
    rows.push({tag:name,earn:Number(m[2]),poss:Number(m[3]),pct:Number(m[4])});
  }
  return {
    subject, module,
    percentCorrect: pctMatch?Number(pctMatch[1]):null,
    earned: earnedMatch?Number(earnedMatch[1]):null,
    possible: possMatch?Number(possMatch[1]):null,
    tags: rows,
    fileName,
  };
}

// ── BUILD DIAGNOSTIC PROFILE ────────────────────────────────────────────────
// Merges a list of parsed diagnostic results into a student profile: domain
// and subskill rollups, plus scaled SAT scores from section totals. Math
// module 1 + module 2 merge into one Math section; R&W is its own.
function buildDiagnosticProfile(parsedList){
  const domains={}, subs={};
  const sectionTotals = {"Reading & Writing":{earn:0,poss:0,count:0},"Math":{earn:0,poss:0,count:0}};
  // Track which domains have subskill data, so we can skip duplicate
  // domain-level summary rows (avoids double-counting).
  const domainsWithSubs = new Set();
  // First pass: identify which tags map to subskills.
  parsedList.forEach(res=>{
    (res.tags||[]).forEach(t=>{
      const map = lookupTag(t.tag);
      if(map && map.kind==="sub") domainsWithSubs.add(`${map.subject}|${map.domain}`);
    });
  });
  parsedList.forEach(res=>{
    if(res.subject && sectionTotals[res.subject] && res.earned!=null && res.possible!=null){
      sectionTotals[res.subject].earn += res.earned;
      sectionTotals[res.subject].poss += res.possible;
      sectionTotals[res.subject].count += 1;
    }
    (res.tags||[]).forEach(t=>{
      const map = lookupTag(t.tag);
      if(!map){ /* unmapped tag — skipped, not crashed */ return; }
      if(map.kind==="sub"){
        const sKey = `${map.subject}|${map.domain}|${map.name}`;
        if(!subs[sKey]) subs[sKey]={earn:0,poss:0,subject:map.subject,domain:map.domain,name:map.name};
        subs[sKey].earn += t.earn;
        subs[sKey].poss += t.poss;
        const dKey = `${map.subject}|${map.domain}`;
        if(!domains[dKey]) domains[dKey]={earn:0,poss:0,subject:map.subject,domain:map.domain,name:map.domain};
        domains[dKey].earn += t.earn;
        domains[dKey].poss += t.poss;
      } else {
        // Only use domain-level row if we have NO sub-level data for it.
        const dKey = `${map.subject}|${map.name}`;
        if(domainsWithSubs.has(dKey)) return;
        if(!domains[dKey]) domains[dKey]={earn:0,poss:0,subject:map.subject,domain:map.name,name:map.name};
        domains[dKey].earn += t.earn;
        domains[dKey].poss += t.poss;
      }
    });
  });
  const fmt=(rec)=>({...rec,pct:rec.poss?Math.round((rec.earn/rec.poss)*100):null});
  const domainArr = Object.values(domains).map(fmt);
  const subArr    = Object.values(subs).map(fmt);

  const rw = sectionTotals["Reading & Writing"];
  const m  = sectionTotals["Math"];
  let rwScore=null, mathScore=null, totalLower=null, totalUpper=null;
  if(rw.count>0){ const s = scaleRW(rw.earn); rwScore = {earn:rw.earn,poss:rw.poss,lower:s[0],upper:s[1]}; }
  if(m.count>0){  const s = scaleMath(m.earn); mathScore = {earn:m.earn,poss:m.poss,lower:s[0],upper:s[1]}; }
  if(rwScore && mathScore){ totalLower = rwScore.lower + mathScore.lower; totalUpper = rwScore.upper + mathScore.upper; }
  return {domains:domainArr,subs:subArr,rwScore,mathScore,totalLower,totalUpper};
}

// Wise Cloud Function caller — posts PSM discussion to the student's Wise class.
// Depends on firebase-functions-compat.js loaded in index.html.
// Waits for the Firestore batch write (debounced in useEffect) to land
// before calling the callable. Polls for the assignment doc to appear.
function assignToWise(studentId, assignmentId, showToastFn){
  if(!studentId||!assignmentId) return;
  const db = window.db;
  if(!db) return;
  showToastFn("Posting to Wise…");
  const fns = firebase.app().functions("us-central1");
  const fn = fns.httpsCallable("assignToWise");
  let attempts = 0;
  function tryCall(){
    fn({studentId, assignmentId})
      .then(r=>{
        const mode = r.data && r.data.mode;
        showToastFn(mode==="dev-redirect" ? "Posted to Wise (dev mode)" : "Posted to Wise ✓");
      })
      .catch(err=>{
        if(attempts < 3 && err.message && err.message.includes("not found")){
          attempts++;
          console.log("assignToWise: retry", attempts, "waiting for Firestore sync…");
          setTimeout(tryCall, 2000);
        } else {
          console.error("assignToWise failed:", err);
          showToastFn("Wise post failed — see console");
        }
      });
  }
  setTimeout(tryCall, 2000);
}

/* Soft-delete helpers. Items with a truthy `deleted` flag are in the trash;
   live() strips them for display, trash() keeps only them for the Trash tab.
   Raw `students` state always contains both — we filter at display time so
   mutations (addAsg, setExamScore, etc.) keep working against the full array. */
const live = arr => (arr||[]).filter(x=>!x.deleted);
const trashed = arr => (arr||[]).filter(x=>x.deleted);
const softDel = x => ({...x, deleted:true, deletedAt: Date.now()});
const softRestore = x => { const {deleted, deletedAt, ...rest} = x; return rest; };

/* CSV parser — RFC 4180-ish, handles quoted fields with embedded commas,
   embedded newlines, and "" escapes. Returns array of row arrays. */
function parseCsvText(text){
  const rows=[]; let row=[]; let cell=""; let q=false;
  for(let i=0;i<text.length;i++){
    const ch=text[i];
    if(q){
      if(ch==='"'){ if(text[i+1]==='"'){cell+='"';i++;} else q=false; }
      else cell+=ch;
    } else {
      if(ch==='"') q=true;
      else if(ch===','){ row.push(cell); cell=""; }
      else if(ch==='\r'){/*skip*/}
      else if(ch==='\n'){ row.push(cell); rows.push(row); row=[]; cell=""; }
      else cell+=ch;
    }
  }
  if(cell.length||row.length){ row.push(cell); rows.push(row); }
  return rows;
}

/* Parse a Wise "Learner Report" CSV export into a list of clean student
   objects. Skips rows before the header ("Table 1" title), handles duplicate
   "Phone Number" columns, and ignores the accommodations column entirely
   (PII we explicitly don't want in PSM). */
function parseWiseCsv(text){
  const rows = parseCsvText(text);
  const headerIdx = rows.findIndex(r => r.some(c => (c||"").trim() === "Name"));
  if(headerIdx < 0) throw new Error('Could not find "Name" column — is this a Wise Learner Report?');
  const header = rows[headerIdx].map(c => (c||"").trim());
  const col = n => header.indexOf(n);
  const idxName = col("Name");
  const idxPhone1 = col("Phone Number");
  const idxPhone2 = header.lastIndexOf("Phone Number");
  const idxEmail = col("Email");
  const idxJoined = col("Joined On");
  const idxGrade = col("Grade Level");
  const idxLevel = col("Level of Tutoring");
  const idxSubject = col("Specific Subject of Tutoring");
  const idxGoals = header.findIndex(c => c.toLowerCase().startsWith("what are your outcome goals"));
  const get = (r,i) => (i>=0 && r[i]!=null) ? String(r[i]).trim() : "";
  const out = [];
  for(let i = headerIdx+1; i < rows.length; i++){
    const r = rows[i];
    const name = get(r, idxName);
    if(!name) continue;
    const phone = get(r, idxPhone1) || (idxPhone2!==idxPhone1 ? get(r, idxPhone2) : "");
    const subject = get(r, idxSubject);
    const level = get(r, idxLevel);
    // Session 18C: Wise import auto-filter — only SAT-tagged rows are
    // brought in by default. Match is "SAT" appearing in either the
    // Specific Subject or the Level of Tutoring column, case-insensitive.
    // Non-SAT rows still appear in the preview so the tutor can opt in
    // if they want, but are unchecked by default.
    const isSat = /\bSAT\b/i.test(subject) || /\bSAT\b/i.test(level);
    out.push({
      name,
      isSat,
      meta: {
        email: get(r, idxEmail),
        phone,
        joinedOn: get(r, idxJoined),
        gradeLevel: get(r, idxGrade),
        levelOfTutoring: level,
        subjectOfTutoring: subject,
        goals: get(r, idxGoals),
        source: "wise",
        importedAt: Date.now(),
      },
    });
  }
  return out;
}

/* ============ PDF DIAGNOSTIC PARSER ============ */
// Thin I/O shell around the pure `parseDiagnosticText` function defined in
// lib/diagnostic.mjs (inlined by build_index.py). Opens the PDF with pdf.js,
// reconstructs the text in reading order using item coordinates, then hands
// off to the pure parser. All fragile heuristics — subject detection, tag
// row regex, module detection — live in `parseDiagnosticText` and are
// covered by tests/diagnostic.test.mjs.
async function parseDiagnosticPdf(file){
  if(!window.pdfjsLib) throw new Error("pdf.js not loaded");
  const buf = await file.arrayBuffer();
  const pdf = await window.pdfjsLib.getDocument({data:buf}).promise;
  let fullText = "";
  for(let p=1;p<=pdf.numPages;p++){
    const page = await pdf.getPage(p);
    const tc = await page.getTextContent();
    const items = tc.items.map(it=>({s:it.str,x:it.transform[4],y:it.transform[5]}));
    items.sort((a,b)=>(b.y-a.y)||(a.x-b.x));
    let lastY=null, line=[];
    const lines=[];
    items.forEach(it=>{
      if(lastY===null||Math.abs(it.y-lastY)>3){if(line.length)lines.push(line.join(" ").trim());line=[it.s];lastY=it.y;}
      else line.push(it.s);
    });
    if(line.length)lines.push(line.join(" ").trim());
    fullText += "\n" + lines.join("\n");
  }
  const result = parseDiagnosticText(fullText, file.name || "");
  if(result.tags.length) console.log("[PSM Parser] Extracted", result.tags.length, "tags:", result.tags.map(r=>`"${r.tag}" ${r.earn}/${r.poss}`));
  return {...result, parsedAt: todayStr()};
}


/* ============ WELLED SCORE REPORT PARSER ============ */
async function parseWelledReport(file){
  if(!window.pdfjsLib) throw new Error("pdf.js not loaded");
  const buf = await file.arrayBuffer();
  const pdf = await window.pdfjsLib.getDocument({data:buf}).promise;
  let fullText = "";
  for(let i=1;i<=pdf.numPages;i++){
    const page = await pdf.getPage(i);
    const tc = await page.getTextContent();
    fullText += tc.items.map(it=>it.str).join(" ") + "\n";
  }
  const result = {
    fileName:file.name, raw:fullText,
    testName:null, testNumber:null, testedOn:null,
    totalScore:null, rwScore:null, mathScore:null,
    rawScores:{},
    // domains[] (8 entries for full, 4 for section-only) populated below.
    // subskills stays empty — WellEd reports don't have catalog-aligned
    // subskill granularity. They contribute to DOMAIN time-points only.
    subskills:[], domains:[],
    type:"full",
  };

  // Test name and number
  const tnMatch = fullText.match(/Test name[:\s]*(.+?)(?:\n|Tested)/i);
  if(tnMatch){
    result.testName = tnMatch[1].trim();
    const numMatch = result.testName.match(/Practice Test\s*#?\s*(\d+)/i);
    if(numMatch) result.testNumber = parseInt(numMatch[1]);
  }
  // Fallback test-number detection — also scan body text for "Practice Test #N".
  if(result.testNumber == null){
    const ptm = fullText.match(/Practice Test\s*#?\s*(\d+)/i);
    if(ptm) result.testNumber = parseInt(ptm[1]);
  }
  // Tested-on date — accept several labels + formats. Normalizes to YYYY-MM-DD.
  for(const label of ["Tested on", "Test date", "Date tested", "Taken on", "Date taken"]){
    let m = null;
    try { m = fullText.match(new RegExp(label + "[:\\s]*([\\d\\/\\-]+|[A-Za-z]+\\s+\\d{1,2},?\\s+\\d{4})", "i")); }
    catch { m = null; }
    if(m){
      const norm = _normalizeReportDate(m[1]);
      if(norm){ result.testedOn = norm; break; }
      if(!result.testedOn) result.testedOn = m[1].trim(); // store raw fallback
    }
  }

  // Total score
  const totalMatch = fullText.match(/TOTAL SCORE\s+(\d{3,4})/i);
  if(totalMatch) result.totalScore = parseInt(totalMatch[1]);

  // Section scores
  const rwMatch = fullText.match(/Reading and Writing\s+(\d{3})/i);
  if(rwMatch) result.rwScore = parseInt(rwMatch[1]);
  const mathMatch = fullText.match(/Math\s+(\d{3})/i);
  if(mathMatch) result.mathScore = parseInt(mathMatch[1]);

  // Determine type
  if(result.rwScore && !result.mathScore) result.type = "rw-only";
  else if(result.mathScore && !result.rwScore) result.type = "math-only";
  else result.type = "full";

  // Raw scores per module
  const modRx = /Module\s*(\d)\s*(?:\(([^)]+)\))?\s*:\s*(\d+)\s*\/\s*(\d+)/gi;
  let mm;
  while((mm=modRx.exec(fullText))!==null){
    const key = `Module ${mm[1]}${mm[2]?" ("+mm[2]+")":""}`;
    result.rawScores[key] = {correct:parseInt(mm[3]),total:parseInt(mm[4])};
  }
  const totalRaw = fullText.match(/Total\s*:\s*(\d+)\s*\/\s*(\d+)/i);
  if(totalRaw) result.rawScores["Total"] = {correct:parseInt(totalRaw[1]),total:parseInt(totalRaw[2])};

  // Session 18C v2: WellEd reports do NOT have subskill granularity that
  // maps to our catalog's subdomain taxonomy. They only have the 8
  // standard SAT domains in "Category Scores". So we extract those as
  // DOMAIN entries (not subskills). Subskills array stays empty.
  //
  // Per Aidan: "for subskills, the only things that count toward them
  // are the diagnostic and the scored worksheets. WellEd assignments
  // and practice tests/sections should only be counted toward overall
  // domains."
  const _WELLED_DOMAIN_MAP = [
    ["Information & Ideas",              "Reading & Writing", "information\\s*(?:and|&)\\s*ideas"],
    ["Craft & Structure",                "Reading & Writing", "craft\\s*(?:and|&)\\s*structure"],
    ["Expression of Ideas",              "Reading & Writing", "expression\\s*of\\s*ideas"],
    ["Standard English Conventions",     "Reading & Writing", "standard\\s*english\\s*conventions"],
    ["Algebra",                          "Math",              "(?<!comp\\s)algebra\\b"],
    ["Advanced Math",                    "Math",              "advanced\\s*math"],
    ["Problem-Solving & Data Analysis",  "Math",              "problem[\\s\\-]*solving\\s*(?:and|&)\\s*data\\s*analysis"],
    ["Geometry & Trigonometry",          "Math",              "geometry\\s*(?:and|&)\\s*trigonometry"],
  ];
  for(const [name, subject, srcFrag] of _WELLED_DOMAIN_MAP){
    let m = null;
    try { m = fullText.match(new RegExp(srcFrag + "\\s*(\\d+)\\s*\\/\\s*(\\d+)", "i")); }
    catch { m = null; } // negative lookbehind may not be supported in older browsers; bail safely
    if(m){
      const earn = parseInt(m[1]);
      const poss = parseInt(m[2]);
      if(Number.isFinite(earn) && Number.isFinite(poss) && poss > 0){
        result.domains.push({subject, name, earn, poss});
      }
    }
  }
  return result;
}

// Normalize a date string from a WellEd report to YYYY-MM-DD.
function _normalizeReportDate(raw){
  if(!raw) return null;
  const s = String(raw).trim();
  let m = s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})$/);
  if(m) return `${m[1]}-${String(m[2]).padStart(2,"0")}-${String(m[3]).padStart(2,"0")}`;
  m = s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})$/);
  if(m){
    const yr = m[3].length === 2 ? `20${m[3]}` : m[3];
    return `${yr}-${String(m[1]).padStart(2,"0")}-${String(m[2]).padStart(2,"0")}`;
  }
  const MONTHS = {jan:"01",feb:"02",mar:"03",apr:"04",may:"05",jun:"06",jul:"07",aug:"08",sep:"09",oct:"10",nov:"11",dec:"12"};
  m = s.match(/^([A-Za-z]+)\s+(\d{1,2}),?\s+(\d{4})$/);
  if(m){
    const mo = MONTHS[m[1].slice(0,3).toLowerCase()];
    if(mo) return `${m[3]}-${mo}-${String(m[2]).padStart(2,"0")}`;
  }
  return null;
}

    if (typeof window === "undefined" || !window.localStorage) return false;
    return window.localStorage.getItem("psm_per_worksheet_submit") === "1";
  } catch {
    return false;
  }
}

// Notes are written out-of-band from the main students batch — they change
// rarely (only on student creation today) and mixing them into every tutor
// state change would fire wasted writes. Notes also must never appear in
// /students/{id} itself because that doc is student-readable.
async function saveStudentNotes(id, notes){
  const ref = notesDocRef(id);
  if(!ref) return;
  try { await ref.set({ notes: notes ?? "" }); }
  catch(e){ console.warn("[Firestore] notes write error:", e); }
}

// Single-doc subscription used by StudentPortal. Never reads the full
// /students collection — that would defeat the per-student rules from
// Phase 2 Session 2. Returns {status, student, error} where status is
// "loading" | "ready" | "not-found" | "error".
//
// Dev-bypass note: ?dev=1 fakes client auth state but does NOT create a
// real Firebase Auth session, and the Firestore rules require one. To test
// the portal locally, sign in for real first (load / without ?dev=1, click
// Sign in with Google, complete workspace auth), then navigate to
// ?dev=1&role=student&studentId=... — the persisted Firebase session will
// satisfy the rules. Without this, reads fail with permission-denied and
// the portal renders the "Couldn't load your student record" error card.
function usePortalStudent(studentId){
  const [state, setState] = useState({status:"loading", student:null, error:null});
  useEffect(()=>{
    if(!studentId){
      setState({status:"not-found", student:null, error:null});
      return;
    }
    const ref = studentDocRef(studentId);
    if(!ref){
      setState({status:"error", student:null, error:new Error("Firestore not initialized")});
      return;
    }
    setState({status:"loading", student:null, error:null});
    const unsub = ref.onSnapshot(
      (snap)=>{
        if(!snap.exists){
          setState({status:"not-found", student:null, error:null});
          return;
        }
        const data = snap.data() || {};
        setState({status:"ready", student:{id:snap.id, ...data}, error:null});
      },
      (err)=>{
        console.warn("[portal] student snapshot error:", err);
        setState({status:"error", student:null, error:err});
      }
    );
    return ()=>unsub();
  }, [studentId]);
  return state;
}

// One-shot lookup for an existing submission doc for (studentId, assignmentId).
// Not a subscription: the editor owns the live textarea state locally, and
// writes are fire-and-forget through a debounced effect. Re-queries when the
// assignment changes. See pickLatestSubmission for the canonical-pick policy.
//
// Same dev-bypass caveat as usePortalStudent: requires a real Firebase Auth
// session. The Firestore rules from Phase 2 Session 2 allow reads only for
// tutor/admin or linked student/parent, neither of which a ?dev=1-only session
// satisfies — sign in for real first.

// Module-cached fetch of the static worksheets catalog hosted at
// /worksheets_catalog.json. Session 14 reads this instead of WS_RAW for
// per-question metadata (questionIds, answerFormat) that Session 12 populated.
// Shared promise — multiple SubmissionEditor instances on the same page
// resolve against one fetch.
let __worksheetCatalogPromise = null;
function fetchWorksheetCatalog(){
  if(__worksheetCatalogPromise) return __worksheetCatalogPromise;
  __worksheetCatalogPromise = fetch("/worksheets_catalog.json", {cache:"force-cache"})
    .then(r => {
      if(!r.ok) throw new Error(`catalog fetch ${r.status}`);
      return r.json();
    })
    .catch(err => {
      __worksheetCatalogPromise = null;  // allow retry on next hook mount
      throw err;
    });
  return __worksheetCatalogPromise;
}
function useWorksheetCatalog(){
  const [state, setState] = useState({status:"loading", catalog:null});
  useEffect(()=>{
    let alive = true;
    fetchWorksheetCatalog().then(
      catalog => { if(alive) setState({status:"ready", catalog}); },
      err => {
        console.warn("[portal] catalog fetch failed:", err);
        if(alive) setState({status:"error", catalog:null});
      }
    );
    return ()=>{ alive = false; };
  }, []);
  return state;
}

// Session 18A: live snapshot of per-worksheet submission docs for one
// (studentId, assignmentId) pair. Returns { status, byWorksheet } where
// byWorksheet is keyed by worksheetId. Used by SubmissionEditor (future)
// for the per-worksheet submit path and by TutorSubmissionsPanel /
// PortalHistoryTab to render per-worksheet status pills.
//
// onSnapshot subscription — tutor + student may be looking at the same
// PSM at the same time, and grading writes happen out-of-band from the
// auto-grade trigger; the live channel keeps the UI consistent without
// hand-rolled invalidation.
function useWorksheetSubmissions(studentId, assignmentId){
  const [state, setState] = useState({status:"loading", byWorksheet:{}});
  useEffect(()=>{
    if(!studentId || !assignmentId){
      setState({status:"not-found", byWorksheet:{}});
      return;
    }
    const col = studentAssignmentWorksheetSubmissionsCollection(studentId, assignmentId);
    if(!col){
      setState({status:"error", byWorksheet:{}});
      return;
    }
    setState({status:"loading", byWorksheet:{}});
    const unsub = col.onSnapshot(
      (snap)=>{
        const by = {};
        snap.forEach(d => { by[d.id] = {id:d.id, ...d.data()}; });
        setState({status:"ready", byWorksheet:by});
      },
      (err)=>{
        console.warn("[portal] worksheetSubmissions snapshot error:", err);
        setState({status:"error", byWorksheet:{}});
      }
    );
    return ()=>unsub();
  }, [studentId, assignmentId]);
  return state;
}

function useSubmissionDraft(studentId, assignmentId){
  const [state, setState] = useState({status:"loading", submission:null});
  useEffect(()=>{
    if(!studentId || !assignmentId){
      setState({status:"not-found", submission:null});
      return;
    }
    const col = studentSubmissionsCollection(studentId);
    if(!col){
      setState({status:"error", submission:null});
      return;
    }
    let cancelled = false;
    setState({status:"loading", submission:null});
    col.where("assignmentId", "==", assignmentId).get()
      .then(snap => {
        if(cancelled) return;
        const docs = snap.docs.map(d => ({id:d.id, ...d.data()}));
        const picked = pickLatestSubmission(docs);
        setState({status: picked ? "ready" : "not-found", submission: picked});
      })
      .catch(err => {
        if(cancelled) return;
        console.warn("[portal] submission query error:", err);
        setState({status:"error", submission:null});
      });
    return ()=>{ cancelled = true; };
  }, [studentId, assignmentId]);
  return state;
}

// Tutor-side live view of one student's submissions. Unlike useSubmissionDraft,
// this is an onSnapshot subscription because the tutor may be reviewing while
// the student is actively submitting — a one-shot .get() would miss the arrival.
// Scoped to one student; the tutor view never needs a cross-student listener.
function useTutorSubmissions(studentId){
  const [state, setState] = useState({status:"loading", submissions:[], error:null});
  useEffect(()=>{
    if(!studentId){
      setState({status:"ready", submissions:[], error:null});
      return;
    }
    const col = studentSubmissionsCollection(studentId);
    if(!col){
      setState({status:"error", submissions:[], error:new Error("Firestore not initialized")});
      return;
    }
    setState({status:"loading", submissions:[], error:null});
    const unsub = col.onSnapshot(
      (snap)=>{
        const docs = snap.docs.map(d => ({id:d.id, ...d.data()}));
        setState({status:"ready", submissions:docs, error:null});
      },
      (err)=>{
        console.warn("[tutor] submissions snapshot error:", err);
        setState({status:"error", submissions:[], error:err});
      }
    );
    return ()=>unsub();
  }, [studentId]);
  return state;
}

// Fetches display metadata ({id, name, grade}) for a small list of children
// in parallel. One-shot .get() per id — labels don't need live updates, and
// the selected child's full live view still goes through usePortalStudent.
// Per-child failures fall back to blank name so the switcher stays usable.
function usePortalChildrenMeta(studentIds){
  const key = (studentIds || []).join(",");
  const [state, setState] = useState({
    status: studentIds && studentIds.length ? "loading" : "idle",
    children: []
  });
  useEffect(()=>{
    if(!studentIds || studentIds.length === 0){
      setState({status:"idle", children:[]});
      return;
    }
    if(!window.db){
      setState({status:"error", children: studentIds.map(id=>({id, name:"", grade:""}))});
      return;
    }
    let cancelled = false;
    setState({status:"loading", children:[]});
    Promise.all(studentIds.map(id =>
      window.db.collection("students").doc(id).get()
        .then(snap => snap.exists
          ? {id, name: (snap.data()||{}).name || "", grade: (snap.data()||{}).grade || ""}
          : {id, name:"", grade:""}
        )
        .catch(err => {
          console.warn("[portal] child meta fetch error:", id, err);
          return {id, name:"", grade:""};
        })
    )).then(children => {
      if(!cancelled) setState({status:"ready", children});
    });
    return ()=>{ cancelled = true; };
  // key is the stable join of ids — avoids re-running on unrelated re-renders.
  // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [key]);
  return state;
}

/* ============ AUTH GATE ============ */
// Allowlist-based auth. Any signed-in, email-verified Firebase Auth user
// whose lowercased email appears as an active `allowlist/{email}` doc is
// granted access; their role and linked student ids are read from that
// doc. Enforced server-side by firestore.rules. This component is UX.

// Dual-write grace window for the Phase 2 schema migration. When true,
// tutor writes go to BOTH /students/{id} (new authoritative path) and
// psm-data/main.students[] (legacy blob). Kept on for ~24 hours post-cutover
// so an in-window rollback is a client revert instead of a reverse
// migration. Flipped to false manually after a clean monitoring window.
// See docs/PHASE_2_SESSION_1.md §Cutover sequence.
const DUAL_WRITE_GRACE = true;

// Read allowlist/{emailLowercase}. Returns {role, studentIds, active, ...} or null.
// One-shot, not a subscription — cached in React state for the session.
async function getAllowlistEntry(email){
  if(!window.db || !email) return null;
  const key = String(email).trim().toLowerCase();
  if(!key) return null;
  try{
    const snap = await window.db.collection("allowlist").doc(key).get();
    if(!snap.exists) return null;
    const data = snap.data() || {};
    // Normalize: studentIds is the source of truth; fall back to legacy singular studentId.
    const studentIds = Array.isArray(data.studentIds)
      ? data.studentIds
      : (data.studentId ? [data.studentId] : []);
    return {
      email: data.email || key,
      role: data.role || null,
      studentIds,
      active: data.active !== false, // default true if missing
      addedBy: data.addedBy || null,
      addedAt: data.addedAt || null,
      raw: data,
    };
  } catch(e){
    console.warn("[allowlist] read error:", e);
    return null;
  }
}
